name: Deploy Platform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/**'
      - 'packages/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-platform
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT }}
      TF_DOMAIN_NAME: ${{ vars.TF_DOMAIN_NAME }}
      TF_HOSTED_ZONE_NAME: ${{ vars.TF_HOSTED_ZONE_NAME }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
      AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
      AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
      AUTH0_PLAN_CLAIM: ${{ vars.AUTH0_PLAN_CLAIM }}
      GROWTH_PLAN_EMAILS: ${{ vars.GROWTH_PLAN_EMAILS }}
      ENTERPRISE_PLAN_EMAILS: ${{ vars.ENTERPRISE_PLAN_EMAILS }}
      VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
      VITE_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}
      VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_STARTER_PRICE_ID }}
      STRIPE_GROWTH_PRICE_ID: ${{ secrets.STRIPE_GROWTH_PRICE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make CI deploy script executable
        run: chmod +x infra/terraform/deploy-ci.sh

      - name: Deploy infrastructure and application
        run: infra/terraform/deploy-ci.sh

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ax018 — VPAT Report Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============ TOKENS ============ */
:root {
  --accent: #4f56d3;
  --accent-ink: #ffffff;

  /* neutrals — light & airy, very low saturation cool-warm neutral */
  --bg:        oklch(0.985 0.003 250);
  --surface:   oklch(1 0 0);
  --surface-2: oklch(0.975 0.004 250);
  --text:      oklch(0.24 0.012 260);
  --text-muted:oklch(0.52 0.012 260);
  --text-faint:oklch(0.66 0.01 260);
  --border:    oklch(0.91 0.005 260);
  --border-strong: oklch(0.84 0.006 260);

  /* conformance semantics */
  --ok:   #15824b;  --ok-bg:  #e6f4ec;
  --warn: #9a6700;  --warn-bg:#fbf0d9;
  --bad:  #b3261e;  --bad-bg: #fbe7e6;
  --na:   #5b6470;  --na-bg:  #eceef1;

  /* shape / rhythm (overridden per direction & density) */
  --radius: 14px;
  --radius-sm: 10px;
  --radius-pill: 999px;
  --shadow: 0 1px 2px rgba(20,24,40,.04), 0 8px 24px -12px rgba(20,24,40,.12);
  --shadow-sm: 0 1px 2px rgba(20,24,40,.05);
  --hair: 1px solid var(--border);
  --pad: 24px;
  --gap: 16px;
  --maxw: 1120px;

  --label-font: "IBM Plex Sans", sans-serif;
  --label-transform: none;
  --label-spacing: 0;
  --label-weight: 600;

  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
}

/* ---- Direction: Console (utilitarian, hairlines, mono labels, square) ---- */
[data-direction="console"] {
  --radius: 0px; --radius-sm: 0px; --radius-pill: 0px;
  --shadow: none; --shadow-sm: none;
  --surface-2: oklch(0.97 0.004 250);
  --border: oklch(0.86 0.006 260);
  --border-strong: oklch(0.74 0.008 260);
  --label-font: var(--mono);
  --label-transform: uppercase;
  --label-spacing: 0.08em;
  --label-weight: 500;
  --pad: 20px;
}
/* ---- Direction: Slate (subtle border + soft shadow, small radius) ---- */
[data-direction="slate"] {
  --radius: 8px; --radius-sm: 6px;
  --shadow: 0 1px 2px rgba(20,24,40,.05), 0 2px 6px rgba(20,24,40,.05);
  --bg: oklch(0.975 0.004 255);
  --label-spacing: 0.01em;
}

/* ---- Density ---- */
[data-density="compact"] { --pad: 16px; --gap: 11px; }
[data-density="comfortable"] { --pad: 26px; --gap: 18px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 15px;
  line-height: 1.5;
}
::selection { background: color-mix(in oklab, var(--accent) 22%, transparent); }

/* focus visibility — practice what we preach */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

.mono { font-family: var(--mono); }
.micro {
  font-family: var(--label-font);
  text-transform: var(--label-transform);
  letter-spacing: var(--label-spacing);
  font-weight: var(--label-weight);
  font-size: 11.5px;
}

/* ============ APP CHROME ============ */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 18px;
  padding: 0 clamp(16px, 4vw, 40px); height: 60px;
  background: color-mix(in oklab, var(--surface) 88%, transparent);
  backdrop-filter: saturate(1.2) blur(10px);
  border-bottom: var(--hair);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -0.01em; }
.brand .mark {
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  background: var(--accent); color: var(--accent-ink);
  display: grid; place-items: center; font-family: var(--mono); font-weight: 600; font-size: 13px;
}
[data-direction="console"] .brand .mark { border-radius: 0; }
.brand .name { font-size: 15px; }
.brand .sub { color: var(--text-faint); font-weight: 500; font-size: 12px; margin-left: 2px; }

.topbar .spacer { flex: 1; }
.topbar .draftpill {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  border: var(--hair); border-radius: var(--radius-pill);
  padding: 4px 11px; background: var(--surface-2);
}

/* stepper */
.stepper { display: none; align-items: center; gap: 4px; overflow-x: auto; scrollbar-width: none; }
@media (min-width: 880px) { .stepper { display: flex; } }
.stepper::-webkit-scrollbar { display: none; }
.step {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--radius-sm);
  color: var(--text-faint); white-space: nowrap; font-size: 12.5px; font-weight: 500;
  background: transparent; border: none;
}
.step .num {
  width: 20px; height: 20px; border-radius: var(--radius-pill);
  display: grid; place-items: center; font-family: var(--mono); font-size: 11px; font-weight: 600;
  border: 1.5px solid var(--border-strong); color: var(--text-faint); flex: none;
}
.step.done { color: var(--text-muted); }
.step.done .num { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.step.active { color: var(--text); }
.step.active .num { border-color: var(--accent); color: var(--accent); }
.step .lbl { display: none; }
@media (min-width: 880px) { .step .lbl { display: inline; } }
.step-divider { width: 14px; height: 1.5px; background: var(--border); flex: none; }

/* main */
.main { flex: 1; width: 100%; max-width: var(--maxw); margin: 0 auto; padding: clamp(22px, 4vw, 44px) clamp(16px, 4vw, 40px) 80px; }

/* ============ PRIMITIVES ============ */
.eyebrow { font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.12em; font-size: 11.5px; color: var(--accent); font-weight: 600; }
h1.title { font-size: clamp(26px, 4vw, 34px); line-height: 1.1; letter-spacing: -0.02em; margin: 12px 0 10px; font-weight: 600; }
.lead { color: var(--text-muted); font-size: 16px; max-width: 60ch; margin: 0; line-height: 1.55; }

.card {
  background: var(--surface); border: var(--hair); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: var(--pad);
}
.panel { background: var(--surface); border: var(--hair); border-radius: var(--radius); box-shadow: var(--shadow); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  border-radius: var(--radius-sm); border: 1px solid transparent;
  padding: 11px 18px; font-size: 14px; font-weight: 600; letter-spacing: -0.005em;
  transition: transform .04s ease, background .15s ease, border-color .15s, box-shadow .15s;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { background: color-mix(in oklab, var(--accent) 88%, black); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-ghost { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-quiet { background: transparent; color: var(--text-muted); padding: 11px 12px; }
.btn-quiet:hover { color: var(--text); background: var(--surface-2); }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn .ic { width: 16px; height: 16px; flex: none; }

.field { display: flex; flex-direction: column; gap: 7px; }
.field label { font-size: 13px; font-weight: 600; color: var(--text); }
.field .hint { font-size: 12.5px; color: var(--text-faint); }
.input, .textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 11px 13px; font-size: 14.5px;
  transition: border-color .15s, box-shadow .15s; color: var(--text);
}
.input:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent); }
.textarea { resize: vertical; min-height: 90px; line-height: 1.55; font-family: var(--sans); }
.input.lg { padding: 15px 16px; font-size: 16px; }
.input-prefix { display: flex; align-items: center; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); overflow: hidden; transition: border-color .15s, box-shadow .15s; }
.input-prefix:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent); }
.input-prefix .pfx { padding: 0 4px 0 16px; color: var(--text-faint); font-family: var(--mono); font-size: 15px; }
.input-prefix input { border: none; outline: none; background: transparent; padding: 15px 16px 15px 6px; font-size: 16px; flex: 1; width: 100%; }

/* badges */
.badge {
  display: inline-flex; align-items: center; gap: 6px; font-weight: 600;
  font-size: 12px; padding: 4px 10px; border-radius: var(--radius-pill);
  font-family: var(--label-font); letter-spacing: var(--label-spacing); text-transform: var(--label-transform);
  border: 1px solid transparent; white-space: nowrap;
}
[data-direction="console"] .badge { font-size: 11px; }
.badge .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.b-ok   { background: var(--ok-bg);   color: var(--ok); }   .b-ok .dot{background:var(--ok);}
.b-warn { background: var(--warn-bg); color: var(--warn); } .b-warn .dot{background:var(--warn);}
.b-bad  { background: var(--bad-bg);  color: var(--bad); }  .b-bad .dot{background:var(--bad);}
.b-na   { background: var(--na-bg);   color: var(--na); }   .b-na .dot{background:var(--na);}

.tag {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  background: var(--surface-2); border: var(--hair); border-radius: var(--radius-pill);
  padding: 2px 9px;
}
[data-direction="console"] .tag { border-radius: 0; }

/* progress */
.bar { height: 6px; background: var(--surface-2); border-radius: var(--radius-pill); overflow: hidden; border: var(--hair); }
.bar > span { display: block; height: 100%; background: var(--accent); border-radius: var(--radius-pill); transition: width .4s cubic-bezier(.4,0,.2,1); }

/* fade-in for screen transitions */
@keyframes riseIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.screen { animation: riseIn .35s ease both; }
@media (prefers-reduced-motion: reduce) { .screen { animation: none; } }

/* utility */
.row { display: flex; align-items: center; gap: var(--gap); }
.col { display: flex; flex-direction: column; }
.between { justify-content: space-between; }
.wrap { flex-wrap: wrap; }
.muted { color: var(--text-muted); }
.faint { color: var(--text-faint); }
.divider { height: 1px; background: var(--border); border: none; margin: 0; }
.hide-mob { display: none; }
@media (min-width: 760px){ .hide-mob { display: revert; } }

#root { display: contents; }
</style>
</head>

<div id="root"></div>
